name: Build standalone

# Produces standalone viewer executables for Windows and Linux.
# - Run manually from the Actions tab (workflow_dispatch), or
# - push a version tag (e.g. v0.1.0) to also attach them to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: gw2chatlogger-windows
            binary: dist/gw2chatlogger.exe
          - os: ubuntu-latest
            artifact: gw2chatlogger-linux
            binary: dist/gw2chatlogger
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Build with PyInstaller
        run: pyinstaller gw2chatlogger.spec --noconfirm --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error

  appimage:
    runs-on: ubuntu-22.04 # older glibc -> the AppImage runs on more distros
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libglib2.0-0 libdbus-1-3 libfontconfig1 \
            libxkbcommon0 libxcb-cursor0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Build AppImage
        run: PYTHON=python bash packaging/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gw2chatlogger-appimage
          path: dist/gw2chatlogger-x86_64.AppImage
          if-no-files-found: error

  release:
    # Only on a version tag: collect all binaries into a GitHub Release.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, appimage]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
